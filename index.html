<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Lecture Trimmer</title>

<link rel="stylesheet" href="style.css">

<script src="./libs/pdf.min.js"></script>
<script src="./libs/pdf-lib.min.js"></script>
</head>

<body>

<h1>PDF Lecture Trimmer</h1>

<div class="panel">

    <label class="file-select">
        PDF選択
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <hr>

    <label>
        <input type="checkbox" id="splitPages" checked>
        上下2分割
    </label>

    <hr>

    <h3>トリミング範囲 (%)</h3>

    <label>
        <input
            type="checkbox"
            id="linkUpperLower"
            checked
        >
        上下共通設定
    </label>

    <hr>

    <h4>上ページ</h4>

    <div class="grid">

        <label>
            左端
            <input type="number"
                id="upperLeft"
                min="0"
                max="100"
                value="16">
        </label>

        <label>
            右端
            <input type="number"
                id="upperRight"
                min="0"
                max="100"
                value="84">
        </label>

        <label>
            上端
            <input type="number"
                id="upperTop"
                min="0"
                max="100"
                value="22">
        </label>

        <label>
            下端
            <input type="number"
                id="upperBottom"
                min="0"
                max="100"
                value="90">
        </label>

    </div>

    <div id="lowerSettings">
        <h4>下ページ</h4>

        <div class="grid">

            <label>
                左端
                <input type="number"
                    id="lowerLeft"
                    min="0"
                    max="100"
                    value="16">
            </label>

            <label>
                右端
                <input type="number"
                    id="lowerRight"
                    min="0"
                    max="100"
                    value="84">
            </label>

            <label>
                上端
                <input type="number"
                    id="lowerTop"
                    min="0"
                    max="100"
                    value="10">
            </label>

            <label>
                下端
                <input type="number"
                    id="lowerBottom"
                    min="0"
                    max="100"
                    value="78">
            </label>

        </div>
    </div>

    <button id="refreshPreview">
        プレビュー更新
    </button>

    <button id="exportPdf">
        PDF生成
    </button>

</div>

<div class="viewer">

    <div class="preview-panel">

        <h2>元ページ</h2>

        <canvas id="originalCanvas"></canvas>

    </div>

    <div class="preview-panel">

        <h2>変換後</h2>

        <canvas id="previewCanvas"></canvas>

    </div>

</div>

<div class="nav">

    <button id="prevPage">◀</button>

    <span id="pageInfo">
        ページ 0 / 0
    </span>

    <button id="nextPage">▶</button>

</div>

<div id="status"></div>

<script src="script.js"></script>

</body>
</html>
