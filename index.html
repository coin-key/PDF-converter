<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF整形</title>

<link rel="stylesheet" href="style.css">

<script src="./libs/pdf.min.js"></script>
<script src="./libs/pdf-lib.min.js"></script>
<script src="./libs/fontkit.umd.min.js"></script>
</head>

<body>

<h1>PDFファイル整形機</h1>

<div class="panel">

    <label class="file-select">
        PDF選択
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <hr>

    <label>
        <input type="checkbox" id="splitPages" checked>
        上下2分割
    </label>

    <hr>

    <h3>トリミング範囲 (%)</h3>

    <label>
        <input
            type="checkbox"
            id="linkUpperLower"
            checked
        >
        上下共通設定
    </label>

    <hr>

    <div class="crop-panels">

        <div class="crop-panel">

            <h4>上ページ</h4>

            <div class="grid">

                <label>
                    左端
                    <input type="number"
                        id="upperLeft"
                        min="0"
                        max="100"
                        value="16">
                </label>

                <label>
                    右端
                    <input type="number"
                        id="upperRight"
                        min="0"
                        max="100"
                        value="84">
                </label>

                <label>
                    上端
                    <input type="number"
                        id="upperTop"
                        min="0"
                        max="100"
                        value="22">
                </label>

                <label>
                    下端
                    <input type="number"
                        id="upperBottom"
                        min="0"
                        max="100"
                        value="90">
                </label>
            </div>
        </div>

        <div
            id="lowerSettings"
            class="crop-panel"
        >
            <h4>下ページ</h4>

            <div class="grid">

                <label>
                    左端
                    <input type="number"
                        id="lowerLeft"
                        min="0"
                        max="100"
                        value="16">
                </label>

                <label>
                    右端
                    <input type="number"
                        id="lowerRight"
                        min="0"
                        max="100"
                        value="84">
                </label>

                <label>
                    上端
                    <input type="number"
                        id="lowerTop"
                        min="0"
                        max="100"
                        value="10">
                </label>

                <label>
                    下端
                    <input type="number"
                        id="lowerBottom"
                        min="0"
                        max="100"
                        value="78">
                </label>
            </div>
        </div>
    </div>

    <br><br>

    <h3>文字追加</h3>

    <label>
        タイトル
    </label>

    <input
        id="titleText"
        placeholder="なし"
    >

    <br>

    <label>
        タイトル位置
    </label>

    <select id="titleTextPosition">

        <option value="bottom-left">下左</option>
        <option value="bottom-center">下中央</option>
        <option value="bottom-right">下右</option>

        <option value="top-left">上左</option>
        <option value="top-center">上中央</option>
        <option value="top-right">上右</option>

    </select>

    <br><br>

    <label>
        <input
            type="checkbox"
            id="enablePageNumber"
        >
        ページ番号
    </label>

    <br>

    <label>
        ページ番号位置
    </label>

    <select id="pageNumberPosition">

        <option value="bottom-right">下右</option>
        <option value="bottom-left">下左</option>
        <option value="bottom-center">下中央</option>

        <option value="top-left">上左</option>
        <option value="top-center">上中央</option>
        <option value="top-right">上右</option>

    </select>

    <br><br>

    <button id="refreshPreview">
        プレビュー更新
    </button>

    <button id="exportPdf">
        PDF出力
    </button>

    <h3>変換後PDF</h3>

    <div id="pdfResult">

        出力待機中

    </div>

    <button
        id="openPdfButton"
        style="display:none;"
    >
        新規タブで開く
    </button>

</div>

<div class="viewer">

    <div class="preview-panel">

        <h2>変換前</h2>

        <canvas id="originalCanvas"></canvas>

    </div>

    <div class="preview-panel">

        <h2>変換後</h2>

        <canvas id="previewCanvas"></canvas>

    </div>

</div>

<div class="nav">

    <button id="prevPage">◀</button>

    <span id="pageInfo">
        ページ 0 / 0
    </span>

    <button id="nextPage">▶</button>

</div>

<div id="status"></div>

<script src="script.js"></script>

</body>
</html>
